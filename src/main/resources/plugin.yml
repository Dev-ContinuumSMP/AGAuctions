name: AGAuctions
version: 1.0
main: com.example.buyorders.BuyOrders
api-version: '1.21'
folia-supported: true
description: AGAuctions
authors: [ Johnny ]
softdepend: [ Vault ]
libraries:
  - com.h2database:h2:2.3.232

commands:
  orders:
    description: Open the buy orders GUI
    usage: /orders [material|collect|claim|reload]
    aliases: [ order ]

  ah:
    description: Open the built-in auction house
    usage: /ah | /ah sell <price> [amount] | /ah auction <startPrice> [duration] [amount] | /ah buy <id> | /ah bid <id> <amount> | /ah claim | /ah orders [material|claim] | /ah buyorder <material> <amount> <priceEach>
    aliases: [ auctionhouse, auction ]

  buyorder:
    description: Create a buy order
    usage: /buyorder <material> <amount> <priceEach> | /buyorder hand <amount> <priceEach>
    aliases: [ axorder, buyorders ]

permissions:
  buyorders.use:
    description: Allows players to view and fill buy orders
    default: true

  buyorders.ah.use:
    description: Allows players to use the built-in auction house
    default: true

  buyorders.ah.sell:
    description: Allows players to create auction listings
    default: true

  buyorders.create:
    description: Allows players to create buy orders
    default: true

  buyorders.admin:
    description: Allows admins to cancel any order
    default: op
