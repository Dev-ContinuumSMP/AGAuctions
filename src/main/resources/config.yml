      - 51
      - 52
      - 53
    material: "GRAY_STAINED_GLASS_PANE"
    amount: 1
    name: " "
    lore: []
  controls:
    cancel:
      slot: 48
      material: "BARRIER"
      amount: 1
      name: "&cCancel"
      lore:
        - "&7Returns deposited items"
    info:
      slot: 49
      material: "PAPER"
      amount: 1
      name: "&eDeposited: &f{deposited}&7/&f{remaining}"
      lore:
        - "&ePrice Each: &a{price_each}"
        - "&ePayout: &a{payout}"
    confirm:
      slot: 50
      material: "EMERALD_BLOCK"
      amount: 1
      name: "&aConfirm Sale"
      lore:
        - "&7Sell deposited matching items"

