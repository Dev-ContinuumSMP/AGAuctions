  no-currency-hook: "&cNo currency provider is available."
  not-enough-money: "&cYou need &e{amount} &cto create that order."
  order-save-failed: "&cCould not save that buy order. Your money/items were refunded."
  refund-failed: "&cSomething failed and the automatic refund could not fully complete. Contact an admin."
  own-order: "&cYou cannot fill your own order."
  no-items: "&cYou do not have any &e{material}&c."
  not-enough-items: "&cYou only have &e{available}x {material}&c."
  fill-invalid-item: "&cThat item does not match this buy order."
